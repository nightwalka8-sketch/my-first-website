<!DOCTYPE html>
<html>
<head>
    <title>Night Walka</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000, #111111);
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: gold;
        }

        .hero {
            padding: 120px 20px;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            opacity: 0.7;
        }

        .btn {
            padding: 14px 30px;
            background: gold;
            color: black;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: orange;
        }

        .section {
            padding: 80px 20px;
        }

        .card {
            background: #1a1a1a;
            margin: 20px auto;
            padding: 20px;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        footer {
            padding: 30px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

<header>
    Night Walka
</header>

<div class="hero">
    <h1>Building My Future With Code 🚀</h1>
    <p>I create websites, apps, and digital ideas.</p>
    <button class="btn">Contact Me</button>
</div>

<div class="section">
    <div class="card">
        <h2>About Me</h2>
        <p>I’m learning coding and building my first tech empire.</p>
    </div>

    <div class="card">
        <h2>My Goal</h2>
        <p>Make money online, build apps, and grow globally.</p>
    </div>
</div>

<footer>
    © 2026 Night Walka
</footer>

</body>
</html>
