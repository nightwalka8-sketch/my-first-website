<!DOCTYPE html>
<html>
<head>
    <title>Night Walka</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000, #111111);
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: gold;
        }

        .hero {
            padding: 120px 20px;
            animation: fadeIn 1.5s ease-in;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            opacity: 0.7;
        }

        .buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 30px;
            background: gold;
            color: black;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .btn:hover {
            transform: scale(1.1);
            background: orange;
            box-shadow: 0 0 25px rgba(255, 165, 0, 0.8);
        }

        .section {
            padding: 80px 20px;
        }

        .card {
            background: #1a1a1a;
            margin: 20px auto;
            padding: 20px;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        footer {
            padding: 30px;
            opacity: 0.5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<header>
    Night Walka
</header>

<div class="hero">
    <h1>Building My Future With Code 🚀</h1>
    <p style="color: gold; margin-top: -10px;">Future Tech Entrepreneur</p>
    <p>I create websites, apps, and digital ideas.</p>

    <div class="buttons">

        <!-- WhatsApp -->
        <a href="https://wa.me/233XXXXXXXXX" target="_blank">
            <button class="btn">WhatsApp Me</button>
        </a>

        <!-- Email -->
        <a href="mailto:your@email.com">
            <button class="btn">Email Me</button>
        </a>

    </div>
</div>

<div class="section">
    <div class="card">
        <h2>About Me</h2>
        <p>I’m learning coding and building my first tech empire.</p>
    </div>

    <div class="card">
        <h2>My Goal</h2>
        <p>Make money online, build apps, and grow globally.</p>
    </div>
</div>

<footer>
    © 2026 Night Walka
</footer>

</body>
</html>
